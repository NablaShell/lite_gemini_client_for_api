version: '3.8'

services:
  gemini-client:
    build: .
    container_name: gemini-flash-client
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_PATH=/data/chat_history.db
    volumes:
      - gemini_data:/data
    restart: unless-stopped

volumes:
  gemini_data:
