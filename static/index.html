<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 2.5 Flash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 24px;
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
        }

        header p {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-top: 4px;
        }

        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a1a;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #888;
            z-index: 100;
        }

        .status.online {
            color: #4ade80;
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 18px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot {
            background: #1e1e1e;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #333;
        }

        .system {
            background: #1a1a2e;
            color: #888;
            align-self: center;
            font-size: 0.8rem;
            max-width: 90%;
            text-align: center;
        }

        .error {
            background: #3a1a1a;
            color: #ff8888;
            border-left: 3px solid #ff4444;
        }

        .input-area {
            padding: 16px;
            background: #0f0f0f;
            border-top: 1px solid #1f1f1f;
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        pre {
            background: #0a0a0a;
            padding: 8px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 0.8rem;
        }

        code {
            font-family: monospace;
            background: #0a0a0a;
            padding: 2px 4px;
            border-radius: 4px;
        }

        @media (max-width: 640px) {
            .message {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🤖 Gemini 2.5 Flash</h1>
        <p>Новейшая модель от Google</p>
    </header>

    <div class="chat" id="chat">
        <div class="message system">
            ✨ Готов к работе. Задай вопрос Gemini 2.5 Flash
        </div>
    </div>

    <div class="input-area">
        <textarea id="input" placeholder="Напиши сообщение... (Ctrl+Enter для отправки)" rows="2"></textarea>
        <button id="send">Отправить</button>
    </div>

    <div class="status" id="status">🔌 проверка...</div>

    <script>
        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const statusDiv = document.getElementById('status');

        let isLoading = false;

        function addMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            
            if (type === 'bot') {
                let formatted = text
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                    .replace(/`([^`]+)`/g, '<code>$1</code>')
                    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                    .replace(/\n/g, '<br>');
                msg.innerHTML = formatted;
            } else {
                msg.textContent = text;
            }
            
            chatDiv.appendChild(msg);
            msg.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        async function checkHealth() {
            try {
                const res = await fetch('/api/health');
                if (res.ok) {
                    statusDiv.textContent = '✅ Gemini 2.5 Flash готов';
                    statusDiv.classList.add('online');
                } else {
                    statusDiv.textContent = '❌ API ошибка';
                }
            } catch (e) {
                statusDiv.textContent = '❌ Сервер не запущен';
            }
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text || isLoading) return;

            addMessage(text, 'user');
            input.value = '';
            isLoading = true;
            sendBtn.disabled = true;

            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message bot';
            loadingMsg.innerHTML = '<span class="loading"></span> Gemini 2.5 Flash думает...';
            loadingMsg.id = 'loading';
            chatDiv.appendChild(loadingMsg);
            loadingMsg.scrollIntoView({ behavior: 'smooth', block: 'end' });

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                document.getElementById('loading')?.remove();

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();
                
                if (data.error) {
                    addMessage(`❌ ${data.error}`, 'error');
                } else {
                    addMessage(data.response, 'bot');
                }
            } catch (err) {
                document.getElementById('loading')?.remove();
                addMessage(`❌ Ошибка: ${err.message}. Проверь что сервер запущен на порту 8000`, 'error');
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }

        input.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        checkHealth();
        setInterval(checkHealth, 30000);
        input.focus();
    </script>
</body>
</html>
