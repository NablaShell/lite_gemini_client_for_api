<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 3.1 Flash Lite Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
        }

        /* Sidebar with history */
        .sidebar {
            width: 280px;
            background: #111111;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #2a2a2a;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .sidebar-header h2 {
            font-size: 1.1rem;
            color: white;
            margin-bottom: 12px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-1px);
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .conversation-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #1a1a1a;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .conversation-item:hover {
            background: #222222;
            border-color: #667eea;
        }

        .conversation-item.active {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-color: #667eea;
        }

        .conversation-title {
            font-size: 0.85rem;
            color: #e0e0e0;
            font-weight: 500;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .conversation-meta {
            font-size: 0.7rem;
            color: #888;
            display: flex;
            justify-content: space-between;
        }

        .delete-conv {
            opacity: 0;
            background: none;
            border: none;
            color: #ff6666;
            cursor: pointer;
            font-size: 0.7rem;
            transition: opacity 0.2s;
        }

        .conversation-item:hover .delete-conv {
            opacity: 1;
        }

        /* Main chat area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #111111;
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 1.3rem;
            color: white;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #4ade80;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            background: #1a1a1a;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a2a2a;
        }

        .message.system {
            background: #1a1a2e;
            color: #a0a0ff;
            align-self: center;
            font-size: 0.85rem;
            max-width: 90%;
            text-align: center;
        }

        .message pre {
            background: #0a0a0a;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message code {
            font-family: monospace;
            background: #0a0a0a;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #2a2a2a;
            background: #0f0f0f;
            display: flex;
            gap: 12px;
        }

        textarea {
            flex: 1;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
            }
            .message {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>💬 Conversations</h2>
            <button class="new-chat-btn" onclick="app.newConversation()">+ New Chat</button>
        </div>
        <div class="conversations-list" id="conversationsList">
            <div class="conversation-item" style="text-align: center; color: #666;">
                Loading...
            </div>
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <h1>🤖 Gemini 3.1 Flash Lite</h1>
            <div class="status">
                <span class="status-dot"></span>
                <span id="statusText">Ready</span>
            </div>
        </div>

        <div class="messages" id="messages">
            <div class="message system">
                ✨ Select a conversation or create a new one
            </div>
        </div>

        <div class="input-area">
            <textarea id="userInput" placeholder="Type a message... (Ctrl+Enter to send)" rows="3"></textarea>
            <button id="sendBtn">📤 Send</button>
        </div>
    </div>

    <script>
        const app = {
            currentConversationId: null,
            isLoading: false,

            async loadConversations() {
                try {
                    const response = await fetch('/api/conversations');
                    const data = await response.json();
                    const conversations = Array.isArray(data) ? data : [];
                    
                    const container = document.getElementById('conversationsList');
                    if (conversations.length === 0) {
                        container.innerHTML = '<div class="conversation-item" style="text-align: center; color: #666;">No conversations</div>';
                        return;
                    }
                    
                    container.innerHTML = conversations.map(conv => `
                        <div class="conversation-item ${this.currentConversationId === conv.id ? 'active' : ''}" 
                             onclick="app.loadConversation(${conv.id})">
                            <div class="conversation-title">${this.escapeHtml(conv.title || 'New conversation')}</div>
                            <div class="conversation-meta">
                                <span>${conv.message_count || 0} messages</span>
                                <button class="delete-conv" onclick="event.stopPropagation(); app.deleteConversation(${conv.id})">🗑</button>
                            </div>
                        </div>
                    `).join('');
                } catch (err) {
                    console.error('Error loading conversations:', err);
                    document.getElementById('conversationsList').innerHTML = 
                        '<div class="conversation-item" style="text-align: center; color: #ff6666;">❌ Error loading</div>';
                }
            },

            async loadConversation(id) {
                this.currentConversationId = id;
                await this.loadConversations();
                
                try {
                    const response = await fetch(`/api/conversations/${id}/messages`);
                    const messages = await response.json();
                    
                    const container = document.getElementById('messages');
                    if (!messages || messages.length === 0) {
                        container.innerHTML = '<div class="message system">💬 Start the conversation</div>';
                    } else {
                        container.innerHTML = messages.map(msg => `
                            <div class="message ${msg.role}">
                                ${msg.role === 'assistant' ? this.formatMarkdown(this.escapeHtml(msg.content)) : this.escapeHtml(msg.content)}
                            </div>
                        `).join('');
                    }
                    this.scrollToBottom();
                } catch (err) {
                    console.error('Error loading messages:', err);
                    document.getElementById('messages').innerHTML = 
                        '<div class="message system">❌ Error loading messages</div>';
                }
            },

            async newConversation() {
                this.currentConversationId = null;
                document.getElementById('messages').innerHTML = '<div class="message system">✨ New conversation. Start typing...</div>';
                document.getElementById('conversationsList').querySelectorAll('.conversation-item').forEach(el => {
                    el.classList.remove('active');
                });
            },

            async deleteConversation(id) {
                if (!confirm('Delete this conversation?')) return;
                
                await fetch(`/api/conversations/${id}`, { method: 'DELETE' });
                if (this.currentConversationId === id) {
                    this.newConversation();
                }
                await this.loadConversations();
            },

            async sendMessage() {
                const input = document.getElementById('userInput');
                const text = input.value.trim();
                if (!text || this.isLoading) return;
                
                const messagesContainer = document.getElementById('messages');
                messagesContainer.innerHTML += `<div class="message user">${this.escapeHtml(text)}</div>`;
                input.value = '';
                this.scrollToBottom();
                
                this.isLoading = true;
                document.getElementById('sendBtn').disabled = true;
                
                const loadingId = 'loading-' + Date.now();
                messagesContainer.innerHTML += `<div class="message assistant" id="${loadingId}"><span class="loading"></span> Thinking...</div>`;
                this.scrollToBottom();
                
                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            text: text,
                            conversation_id: this.currentConversationId
                        })
                    });
                    
                    const data = await response.json();
                    document.getElementById(loadingId)?.remove();
                    
                    if (data.error) {
                        messagesContainer.innerHTML += `<div class="message system">❌ Error: ${this.escapeHtml(data.error)}</div>`;
                    } else {
                        messagesContainer.innerHTML += `<div class="message assistant">${this.formatMarkdown(this.escapeHtml(data.response))}</div>`;
                        this.currentConversationId = data.conversation_id;
                    }
                    
                    await this.loadConversations();
                    this.scrollToBottom();
                    
                } catch (err) {
                    document.getElementById(loadingId)?.remove();
                    messagesContainer.innerHTML += `<div class="message system">❌ Error: ${this.escapeHtml(err.message)}</div>`;
                } finally {
                    this.isLoading = false;
                    document.getElementById('sendBtn').disabled = false;
                    input.focus();
                }
            },

            formatMarkdown(text) {
                return text
                    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>')
                    .replace(/`([^`]+)`/g, '<code>$1</code>')
                    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                    .replace(/\n/g, '<br>');
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            scrollToBottom() {
                const container = document.getElementById('messages');
                container.scrollTop = container.scrollHeight;
            },

            async checkHealth() {
                try {
                    const res = await fetch('/api/health');
                    if (res.ok) {
                        document.getElementById('statusText').textContent = 'Online';
                    }
                } catch(e) {
                    document.getElementById('statusText').textContent = 'Offline';
                }
            }
        };

        // Initialize
        document.getElementById('sendBtn').onclick = () => app.sendMessage();
        document.getElementById('userInput').onkeydown = (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                app.sendMessage();
            }
        };
        
        app.loadConversations();
        app.checkHealth();
        setInterval(() => app.checkHealth(), 30000);
    </script>
</body>
</html>
